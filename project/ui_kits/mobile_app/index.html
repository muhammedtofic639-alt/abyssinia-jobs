<!-- @startingPoint section="Mobile App" subtitle="Abyssinia Jobs mobile — onboarding, swipe feed, filters" viewport="390x844" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Abyssinia Jobs — Mobile App</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #070708; display: flex; align-items: center; justify-content: center; font-family: var(--font-body); }
  body { padding: 24px; }
  button, input, textarea, select { font-family: inherit; }
  input::placeholder, textarea::placeholder { color: var(--text-tertiary); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="./utils.jsx"></script>
<script type="text/babel" src="./OnboardScreens.jsx"></script>
<script type="text/babel" src="./SwipeScreens.jsx"></script>

<script type="text/babel">
  const SCREENS = {
    ROLE_SELECT: 'ROLE_SELECT',
    SEEKER_ONBOARD: 'SEEKER_ONBOARD',
    SEEKER_COMPLETE: 'SEEKER_COMPLETE',
    EMPLOYER_ONBOARD: 'EMPLOYER_ONBOARD',
    AWAITING_APPROVAL: 'AWAITING_APPROVAL',
    SWIPE_FEED: 'SWIPE_FEED',
  };

  function SeekerCompleteScreen({ onNext }) {
    return (
      <div style={{ position:'absolute', inset:0, background:'var(--bg-base)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'0 32px', textAlign:'center' }}>
        <div style={{ width:88, height:88, borderRadius:26, background:'var(--accent-soft)', border:'1.5px solid var(--border-accent)', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:24 }}>
          <span style={{ color:'var(--accent)', fontSize:44 }}>✓</span>
        </div>
        <h2 style={{ margin:'0 0 10px', fontFamily:'var(--font-display)', fontSize:28, fontWeight:700, color:'var(--text-primary)', letterSpacing:'-0.03em' }}>You're live!</h2>
        <p style={{ margin:'0 0 36px', fontFamily:'var(--font-body)', fontSize:15, color:'var(--text-secondary)', lineHeight:1.55 }}>Your profile is now visible in the talent pool. Employers can discover and contact you.</p>
        <div style={{ display:'flex', gap:8, marginBottom:32 }}>
          <span style={{ display:'inline-flex', alignItems:'center', gap:6, height:28, padding:'0 12px', borderRadius:999, background:'rgba(212,255,0,0.1)', border:'1px solid rgba(212,255,0,0.3)', fontFamily:'var(--font-body)', fontSize:12, fontWeight:600, color:'var(--accent)' }}>
            <span style={{ width:6, height:6, borderRadius:'50%', background:'var(--accent)' }} /> Active
          </span>
        </div>
        <button onClick={onNext} style={{ width:'100%', maxWidth:280, height:56, borderRadius:999, border:'none', cursor:'pointer', background:'var(--accent)', color:'var(--on-accent)', fontFamily:'var(--font-body)', fontSize:17, fontWeight:800, boxShadow:'0 8px 24px rgba(212,255,0,0.4)' }}>Browse employers →</button>
      </div>
    );
  }

  function App() {
    const [screen, setScreen] = React.useState(SCREENS.ROLE_SELECT);
    const [filterOpen, setFilterOpen] = React.useState(false);

    return (
      <PhoneShell>
        {screen === SCREENS.ROLE_SELECT && (
          <RoleSelectScreen onSelectRole={role => setScreen(role === 'SEEKER' ? SCREENS.SEEKER_ONBOARD : SCREENS.EMPLOYER_ONBOARD)} />
        )}
        {screen === SCREENS.SEEKER_ONBOARD && (
          <SeekerOnboardScreen onComplete={() => setScreen(SCREENS.SEEKER_COMPLETE)} />
        )}
        {screen === SCREENS.SEEKER_COMPLETE && (
          <SeekerCompleteScreen onNext={() => setScreen(SCREENS.SWIPE_FEED)} />
        )}
        {screen === SCREENS.EMPLOYER_ONBOARD && (
          <EmployerOnboardScreen onSubmit={() => setScreen(SCREENS.AWAITING_APPROVAL)} />
        )}
        {screen === SCREENS.AWAITING_APPROVAL && (
          <AwaitingApprovalScreen onReset={() => setScreen(SCREENS.ROLE_SELECT)} />
        )}
        {(screen === SCREENS.SWIPE_FEED || screen === SCREENS.SEEKER_COMPLETE) && screen === SCREENS.SWIPE_FEED && (
          <SwipeFeedScreen onOpenFilter={() => setFilterOpen(true)} />
        )}
        {filterOpen && screen === SCREENS.SWIPE_FEED && (
          <FilterScreen onClose={() => setFilterOpen(false)} />
        )}

        {/* Bottom nav hint (swipe feed only) */}
        {screen === SCREENS.SWIPE_FEED && (
          <div style={{ position:'absolute', bottom:0, left:0, right:0, height:50, background:'var(--bg-base)', borderTop:'1px solid var(--border-subtle)', display:'flex', alignItems:'center', justifyContent:'space-around', padding:'0 10px', zIndex:60 }}>
            {[['layout-grid','Feed'],['star','Matches'],['user','Profile']].map(([icon,lbl],i) => (
              <button key={icon} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:2, background:'transparent', border:'none', cursor:'pointer', color: i===0 ? 'var(--accent)' : 'var(--text-tertiary)', minWidth:56, padding:'6px 0' }}>
                <Icon name={icon} size={20} color={i===0 ? 'var(--accent)' : 'var(--text-tertiary)'} />
                <span style={{ fontFamily:'var(--font-body)', fontSize:10, fontWeight:600 }}>{lbl}</span>
              </button>
            ))}
          </div>
        )}
      </PhoneShell>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
