<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html,body{margin:0}
  body{background:var(--bg-base);font-family:var(--font-body);padding:22px}
  .row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-tertiary);width:64px;flex-shrink:0;font-weight:700}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, IconButton } = window.AbyssiniaJobsDesignSystem_633419;
  function Demo(){
    return (
      <div>
        <div className="row"><span className="lbl">Variant</span>
          <Button variant="primary">Apply now</Button>
          <Button variant="secondary">Save</Button>
          <Button variant="ghost">Skip</Button>
          <Button variant="danger">Reject</Button>
        </div>
        <div className="row"><span className="lbl">Size</span>
          <Button size="sm">Small</Button>
          <Button size="md">Medium</Button>
          <Button size="lg">Large</Button>
        </div>
        <div className="row"><span className="lbl">State</span>
          <Button loading>Loading</Button>
          <Button disabled>Disabled</Button>
          <IconButton variant="accent" label="like">♥</IconButton>
          <IconButton variant="glass" label="info">✕</IconButton>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
