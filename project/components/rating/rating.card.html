<!-- @dsCard group="Components" viewport="700x180" name="Star Rating (1–10)" subtitle="Admin rating scale — read-only display and interactive" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html,body{margin:0}
  body{background:var(--bg-base);font-family:var(--font-body);padding:24px}
  .row{display:flex;align-items:center;gap:16px;margin-bottom:18px}
  .lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-tertiary);width:120px;font-weight:700}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { StarRating } = window.AbyssiniaJobsDesignSystem_633419;
  function Demo(){
    const [v,setV]=React.useState(7);
    return (
      <div>
        <div className="row"><span className="lbl">Display</span><StarRating value={8}/></div>
        <div className="row"><span className="lbl">Mid score</span><StarRating value={5}/></div>
        <div className="row"><span className="lbl">Interactive</span><StarRating value={v} interactive onRate={setV}/></div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
