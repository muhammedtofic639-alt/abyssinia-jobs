<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
html,body{margin:0}
body{background:var(--bg-base);padding:24px;font-family:var(--font-mono);display:flex;gap:16px;align-items:center}
.c{display:flex;flex-direction:column;align-items:center;gap:10px}
.b{width:84px;height:84px;background:var(--surface-card);border:1px solid var(--border-strong)}
.l{font-size:11px;color:var(--text-secondary)}
</style></head>
<body>
<div class="c"><div class="b" style="border-radius:var(--radius-sm)"></div><span class="l">sm 12</span></div>
<div class="c"><div class="b" style="border-radius:var(--radius-md)"></div><span class="l">md 16</span></div>
<div class="c"><div class="b" style="border-radius:var(--radius-lg)"></div><span class="l">lg 22</span></div>
<div class="c"><div class="b" style="border-radius:var(--radius-xl)"></div><span class="l">xl 28</span></div>
<div class="c"><div class="b" style="border-radius:var(--radius-pill)"></div><span class="l">pill</span></div>
</body></html>
