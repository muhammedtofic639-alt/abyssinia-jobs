<!-- @dsCard group="Colors" viewport="700x150" name="Ink — Dark Surfaces" subtitle="Deep charcoal backgrounds, darkest to elevated" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
html,body{margin:0}
body{background:#000;font-family:var(--font-mono);padding:20px;display:flex;gap:10px}
.sw{flex:1;height:108px;border-radius:14px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-sizing:border-box;border:1px solid var(--border-subtle)}
.n{font-size:11px;font-weight:700;color:var(--text-primary)}.h{font-size:10px;color:var(--text-tertiary)}
</style></head>
<body>
<div class="sw" style="background:var(--ink-900)"><span class="n">base</span><span class="h">#0B0B0C</span></div>
<div class="sw" style="background:var(--ink-800)"><span class="n">raised</span><span class="h">#121214</span></div>
<div class="sw" style="background:var(--ink-750)"><span class="n">card</span><span class="h">#161619</span></div>
<div class="sw" style="background:var(--ink-700)"><span class="n">elevated</span><span class="h">#1C1C20</span></div>
<div class="sw" style="background:var(--ink-600)"><span class="n">pressed</span><span class="h">#26262C</span></div>
</body></html>
