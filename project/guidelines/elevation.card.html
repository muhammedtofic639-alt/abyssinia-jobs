<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation & Glow" subtitle="Drop shadows on black + the lime / verify glow" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
html,body{margin:0}
body{background:var(--bg-base);padding:28px;font-family:var(--font-mono);display:flex;gap:22px;align-items:center}
.c{display:flex;flex-direction:column;align-items:center;gap:12px}
.b{width:96px;height:72px;border-radius:16px;background:var(--surface-card);border:1px solid var(--border-subtle)}
.l{font-size:11px;color:var(--text-secondary)}
</style></head>
<body>
<div class="c"><div class="b" style="box-shadow:var(--shadow-sm)"></div><span class="l">sm</span></div>
<div class="c"><div class="b" style="box-shadow:var(--shadow-md)"></div><span class="l">md</span></div>
<div class="c"><div class="b" style="box-shadow:var(--shadow-lg)"></div><span class="l">lg / card</span></div>
<div class="c"><div class="b" style="background:var(--accent);box-shadow:0 8px 24px var(--accent-glow)"></div><span class="l" style="color:var(--accent)">accent glow</span></div>
<div class="c"><div class="b" style="background:var(--verify);box-shadow:0 0 16px var(--verify-glow)"></div><span class="l" style="color:var(--verify)">verify glow</span></div>
</body></html>
