<!-- @dsCard group="Colors" viewport="700x150" name="Accent — Electric Lime" subtitle="The single brand accent. One per screen." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
html,body{margin:0}
body{background:var(--bg-base);font-family:var(--font-mono);padding:20px;display:flex;gap:12px}
.sw{flex:1;height:108px;border-radius:14px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-sizing:border-box}
.n{font-size:11px;font-weight:700}.h{font-size:11px;opacity:.7}
</style></head>
<body>
<div class="sw" style="background:var(--lime-600)"><span class="n" style="color:#000">lime-600</span><span class="h" style="color:#000">#B8E000</span></div>
<div class="sw" style="background:var(--lime-500);box-shadow:0 8px 24px var(--accent-glow)"><span class="n" style="color:#000">lime-500 · accent</span><span class="h" style="color:#000">#D4FF00</span></div>
<div class="sw" style="background:var(--lime-400)"><span class="n" style="color:#000">lime-400</span><span class="h" style="color:#000">#E0FF4D</span></div>
<div class="sw" style="background:var(--accent-soft);border:1px solid var(--border-accent)"><span class="n" style="color:var(--accent)">accent-soft</span><span class="h" style="color:var(--accent)">tint 12%</span></div>
</body></html>
