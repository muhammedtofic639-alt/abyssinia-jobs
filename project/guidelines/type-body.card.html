<!-- @dsCard group="Type" viewport="700x180" name="Body — Manrope" subtitle="Running UI text, three sizes + weights" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
html,body{margin:0}
body{background:var(--bg-base);padding:24px;font-family:var(--font-body)}
.r{display:flex;align-items:baseline;gap:14px;margin-bottom:10px}
.m{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);width:80px;flex-shrink:0}
</style></head>
<body>
<div class="r"><span class="m">17 / lg</span><span style="font-size:17px;color:var(--text-primary);font-weight:600">A short pitch in your own words.</span></div>
<div class="r"><span class="m">15 / body</span><span style="font-size:15px;color:var(--text-primary)">Default UI text — calm, legible, friendly on dark.</span></div>
<div class="r"><span class="m">13 / sm</span><span style="font-size:13px;color:var(--text-secondary)">Secondary label · helper text · metadata</span></div>
<div class="r"><span class="m">11 / xs</span><span style="font-size:11px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.12em;font-weight:700">Eyebrow / overline</span></div>
</body></html>
