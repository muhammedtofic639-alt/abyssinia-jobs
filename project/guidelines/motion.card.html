<!-- @dsCard group="Brand" viewport="700x150" name="Motion — Easing" subtitle="Dur fast/base/slow + standard/out/spring easings" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
html,body{margin:0}
body{background:var(--bg-base);padding:24px;font-family:var(--font-mono);display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.row{display:flex;flex-direction:column;align-items:flex-start;gap:7px}
.pill{height:36px;padding:0 16px;border-radius:999px;background:var(--surface-card);border:1px solid var(--border-default);color:var(--text-primary);font-size:12px;font-family:var(--font-mono);display:flex;align-items:center;gap:8px;white-space:nowrap}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.lbl{font-size:10px;color:var(--text-tertiary);letter-spacing:.1em;text-transform:uppercase}
</style></head>
<body>
<div class="row">
  <span class="lbl">Duration</span>
  <div class="pill"><span class="dot"></span>fast · 140ms</div>
  <div class="pill"><span class="dot"></span>base · 240ms</div>
  <div class="pill"><span class="dot"></span>slow · 360ms</div>
</div>
<div class="row">
  <span class="lbl">Easing</span>
  <div class="pill" style="border-color:var(--border-accent)">standard · cubic .4,0,.2,1</div>
  <div class="pill" style="color:var(--accent)">out · cubic .16,1,.3,1 — enter</div>
  <div class="pill">spring · .34,1.4,.5,1 — accents</div>
</div>
</body></html>
